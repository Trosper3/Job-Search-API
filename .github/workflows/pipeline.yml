name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install uv
        uv venv
        source .venv/bin/activate
        uv sync --dev
- name: Run tests with coverage
      run: |
        source .venv/bin/activate
        coverage run --source=app -m pytest
        coverage report
